// FIARS usernames map to fake email addresses for Supabase Auth
function authEmail(username){return username.trim().toLowerCase()+'@fiars.local';}

async function loadDB(){
  if(isSupabaseConfigured){
    try{
      const {data,error}=await sb.from('fiars_state').select('data').eq('id',1).single();
      if(error) throw error;
      if(data&&data.data&&Object.keys(data.data).length>0){
        return data.data;
      }
      // Row exists but empty -> seed it
      const seed=JSON.parse(JSON.stringify(DEFAULT_SEED));
      const {error: upsertErr}=await sb.from('fiars_state').upsert({id:1,data:seed,updated_by:'system'});
      if(upsertErr) throw upsertErr;
      return seed;
    }catch(e){
      console.error('SUPABASE LOAD ERROR:',e);
      lastSupabaseError='LOAD: '+(e.message||JSON.stringify(e));
    }
  }
  // Fallback: browser-local storage (single-user/demo mode)
  try{
    const r=await window.storage.get(STORE_KEY);
    return r?JSON.parse(r.value):JSON.parse(JSON.stringify(DEFAULT_SEED));
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_SEED));}
}

let lastSupabaseError=null;

async function saveDB(){
  if(isSupabaseConfigured){
    try{
      const {error}=await sb.from('fiars_state').upsert({id:1,data:DB,updated_by:S.user?S.user.Username:'system',updated_at:new Date().toISOString()});
      if(error) throw error;
      lastSupabaseError=null;
      return;
    }catch(e){
      console.error('SUPABASE SAVE ERROR:',e);
      lastSupabaseError='SAVE: '+(e.message||JSON.stringify(e));
      showToast('⚠ Save to shared database failed — see console','te');
    }
  }
  try{await window.storage.set(STORE_KEY,JSON.stringify(DB));}catch(e){}
}

// Manually re-fetch the latest data from Supabase (used by Refresh button)
async function refreshFromRemote(){
  if(!isSupabaseConfigured) return;
  try{
    const {data,error}=await sb.from('fiars_state').select('data,updated_at').eq('id',1).single();
    if(error) throw error;
    if(data&&data.data&&Object.keys(data.data).length>0){
      DB=data.data;
    }
  }catch(e){console.warn('Manual refresh failed',e);}
}

// Subscribe to realtime changes from other users/tabs
function startRealtimeSync(){
  if(!isSupabaseConfigured||realtimeChannel) return;
  realtimeChannel=sb.channel('fiars_state_changes')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'fiars_state',filter:'id=eq.1'},(payload)=>{
      if(!payload.new||!payload.new.data) return;
      // Avoid reloading if WE were the ones who just saved
      if(payload.new.updated_by===S.user?.Username&&Date.now()-lastLocalSaveTime<2000) return;
      DB=payload.new.data;
      if(S.loggedIn) render();
      showToast('Data synced from another user','ti');
    })
    .subscribe();
  // Fallback polling every 15s in case websocket realtime is blocked by network/firewall
  if(!pollInterval){
    pollInterval=setInterval(async()=>{
      if(!S.loggedIn) return;
      const before=JSON.stringify(DB);
      await refreshFromRemote();
      if(JSON.stringify(DB)!==before) render();
    },15000);
  }
}

function h(tag,attrs={},...ch){
  const el=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==='cls') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(c==null||c===false) continue;
    if(typeof c==='string'||typeof c==='number') el.appendChild(document.createTextNode(c));
    else if(c instanceof Node) el.appendChild(c);
  }
  return el;
}
function ht(tag,cls,text){const el=document.createElement(tag);el.className=cls;el.textContent=text;return el;}

function bdg(text,c='bgr'){const b=document.createElement('span');b.className='badge '+c;b.textContent=text;return b;}
function stBdg(s){const m={Scheduled:'bgr','On Time':'bb','Arr Delayed':'ba','Dep Delayed':'ba',Delayed:'ba',Departed:'bg',Arrived:'bg',Cancelled:'br'};return bdg(s,m[s]||'bgr');}

function fmtT(ts){if(!ts)return'—';return ts.includes('T')?ts.slice(11,16):ts;}
function fmtD(ts){if(!ts)return'—';return ts.slice(0,10);}

function showToast(msg,type='ts'){

  t.className='toast '+type;t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>{if(t.parentNode)t.parentNode.removeChild(t);},3600);
}

  if(S.userRole==='Manager') return ['Duty Manager','OCC Agent','Agent'].includes(u.Role);
  if(S.userRole==='Duty Manager') return ['OCC Agent','Agent'].includes(u.Role);
  return false;
}

}

function getFIC(fid){return DB.ficLogs.find(l=>l.FlightID===fid)||null;}

// ── ALERT ENGINE ────────────────────────────────────────────
function nowHHMM(){const n=new Date();return n.getHours().toString().padStart(2,'0')+n.getMinutes().toString().padStart(2,'0');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function minsDiff(hhmm1,hhmm2){// hhmm2 - hhmm1 in minutes
  const toMins=s=>{if(!s||s.length<4)return null;return parseInt(s.slice(0,2))*60+parseInt(s.slice(2,4));};
  const a=toMins(hhmm1),b=toMins(hhmm2);if(a===null||b===null)return null;return b-a;}
function minsUntil(hhmm){return minsDiff(nowHHMM(),hhmm);}// positive = future, negative = past

function generateAlerts(){
  if(!DB||!DB.flights) return;
  const today=todayStr();
  const now=nowHHMM();
  const flights=DB.flights.filter(f=>!f.IsDeleted&&f.FlightDate===today);
  const bl_map={},fic_map={};
  (DB.basementLogs||[]).forEach(l=>bl_map[l.FlightID]=l);
  (DB.ficLogs||[]).forEach(l=>fic_map[l.FlightID]=l);

  flights.forEach(f=>{
    const bl=bl_map[f.ID]||{};
    const fic=fic_map[f.ID]||{};
    const st=getServiceType(f);
    const hasArr=st==='Terminating'||st==='TurnAround';
    const hasDep=st==='Originating'||st==='TurnAround';

    function fireAlert(key,title,msg,dept,priority){
      // Check if alert already exists for this key+flight
      const existing=DB.alerts.find(a=>a.AlertKey===key&&a.FlightID===f.ID);
      if(existing){
        // Auto-dismiss if condition is now resolved
        if(existing.AutoDismissed===false||existing.IsDismissed) return;
        return;
      }
      // Create new alert
      const al={
        ID:DB.nextID.alerts++,
        AlertKey:key,
        FlightID:f.ID,
        AlertTitle:title,
        AlertMessage:msg,
        Department:dept,
        Priority:priority,
        FiredAt:new Date().toISOString(),
        FiredDate:today,
        IsDismissed:false,
        AutoDismissed:false,
        DismissedBy:'',
        DismissedAt:'',
        Status:'Active'
      };
      DB.alerts.push(al);
      saveDB();
    }

    function autoDismiss(key,resolved){
      const al=DB.alerts.find(a=>a.AlertKey===key&&a.FlightID===f.ID&&!a.IsDismissed&&!a.AutoDismissed);
      if(al&&resolved){al.IsDismissed=true;al.AutoDismissed=true;al.DismissedBy='system';al.DismissedAt=new Date().toISOString();al.Status='Auto-Resolved';saveDB();}
    }

    // ── ATA — 15min and 30min after STA ─────────────────
    if(hasArr&&f.STA){
      const minsAfterSTA=minsUntil(f.STA)!==null?-minsUntil(f.STA):null;
      autoDismiss('ATA_15',!!f.ATA);
      autoDismiss('ATA_30',!!f.ATA);
      if(!f.ATA&&minsAfterSTA!==null){
        if(minsAfterSTA>=15&&minsAfterSTA<30) fireAlert('ATA_15','ATA Not Updated — '+f.FlightNo,f.FlightNo+' STA was '+f.STA+'. ATA not recorded (15 min passed).','FIC/Ramp','High');
        if(minsAfterSTA>=30) fireAlert('ATA_30','ATA Overdue — '+f.FlightNo,f.FlightNo+' STA was '+f.STA+'. ATA still missing (30+ min).','FIC/Ramp','Critical');
      }
    }

    // ── ATD — 15min and 30min after STD ─────────────────
    if(hasDep&&f.STD){
      const minsAfterSTD=minsUntil(f.STD)!==null?-minsUntil(f.STD):null;
      autoDismiss('ATD_15',!!f.ATD);
      autoDismiss('ATD_30',!!f.ATD);
      if(!f.ATD&&minsAfterSTD!==null){
        if(minsAfterSTD>=15&&minsAfterSTD<30) fireAlert('ATD_15','ATD Not Updated — '+f.FlightNo,f.FlightNo+' STD was '+f.STD+'. ATD not recorded (15 min passed).','FIC/Ramp','High');
        if(minsAfterSTD>=30) fireAlert('ATD_30','ATD Overdue — '+f.FlightNo,f.FlightNo+' STD was '+f.STD+'. ATD still missing (30+ min).','FIC/Ramp','Critical');
      }
    }

    // ── Parking Stand — 3hrs before STA (Terminating) ───
    if(hasArr&&!hasDep&&f.STA){
      const minsUntilSTA=minsUntil(f.STA);
      autoDismiss('STAND_ARR',!!f.ParkingStand);
      if(!f.ParkingStand&&minsUntilSTA!==null&&minsUntilSTA<=180&&minsUntilSTA>=0)
        fireAlert('STAND_ARR','Stand Not Allocated — '+f.FlightNo,f.FlightNo+' arrives at '+f.STA+'. Parking stand not allocated (within 3hrs).','FIC/Ramp','High');
    }

    // ── Parking Stand — 3hrs before STD (Originating/TA) ─
    if(hasDep&&f.STD){
      const minsUntilSTD=minsUntil(f.STD);
      autoDismiss('STAND_DEP',!!f.ParkingStand);
      if(!f.ParkingStand&&minsUntilSTD!==null&&minsUntilSTD<=180&&minsUntilSTD>=0)
        fireAlert('STAND_DEP','Stand Not Allocated — '+f.FlightNo,f.FlightNo+' departs at '+f.STD+'. Parking stand not allocated (within 3hrs).','FIC/Ramp','High');
    }

    // ── Arr MVT — 5mins after ATA ────────────────────────
    if(hasArr&&f.ATA){
      const minsAfterATA=-minsUntil(f.ATA);
      autoDismiss('ARR_MVT',!!bl.ArrMVTSent);
      if(!bl.ArrMVTSent&&minsAfterATA!==null&&minsAfterATA>=5)
        fireAlert('ARR_MVT','Arr MVT Not Sent — '+f.FlightNo,f.FlightNo+' ATA was '+f.ATA+'. Arrival MVT not sent (5+ min after ATA).','Basement/LC','High');
    }

    // ── Dep MVT — 5mins after ATD ────────────────────────
    if(hasDep&&f.ATD){
      const minsAfterATD=-minsUntil(f.ATD);
      autoDismiss('DEP_MVT',!!bl.DepMVTSent);
      if(!bl.DepMVTSent&&minsAfterATD!==null&&minsAfterATD>=5)
        fireAlert('DEP_MVT','Dep MVT Not Sent — '+f.FlightNo,f.FlightNo+' ATD was '+f.ATD+'. Departure MVT not sent (5+ min after ATD).','Basement/LC','High');
    }

    // ── Pre-flight Briefing — 4hrs before STD ───────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('PREFLIGHT',!!bl.PreFlightBriefingCheck);
      if(!bl.PreFlightBriefingCheck&&mu!==null&&mu<=240&&mu>=0)
        fireAlert('PREFLIGHT','Pre-flight Briefing Overdue — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. Pre-flight briefing not done (within 4hrs).','Basement/LC','High');
    }

    // ── EZFW — 4hrs before STD ───────────────────────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('EZFW',!!bl.EZFWSent);
      if(!bl.EZFWSent&&mu!==null&&mu<=240&&mu>=0)
        fireAlert('EZFW','EZFW Not Sent — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. EZFW not sent (within 4hrs of STD).','Basement/LC','High');
    }

    // ── Plan to Basement — 4hrs before STD ──────────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('PLAN_BAS',!!bl.PlanSentToBasement);
      if(!bl.PlanSentToBasement&&mu!==null&&mu<=240&&mu>=0)
        fireAlert('PLAN_BAS','Plan Not Sent to Basement — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. Plan not sent to basement (within 4hrs).','Basement/LC','High');
    }

    // ── LIR Release — 1:30 before STD ───────────────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('LIR',!!bl.LIRReleaseCheck);
      if(!bl.LIRReleaseCheck&&mu!==null&&mu<=90&&mu>=0)
        fireAlert('LIR','LIR Not Released — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. LIR not released (within 1:30).','Basement/LC','High');
    }

    // ── LC Release — 0:15 before STD ────────────────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('LC_REL',!!bl.LCReleaseCheck);
      if(!bl.LCReleaseCheck&&mu!==null&&mu<=15&&mu>=0)
        fireAlert('LC_REL','LC Not Released — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. LC not released (within 15min).','Basement/LC','Critical');
    }

    // ── No-Show with Basement — 0:20 before STD ─────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('NOSHOW_BAS',!!fic.NoShowCheckedWithBasement);
      if(!fic.NoShowCheckedWithBasement&&mu!==null&&mu<=20&&mu>=0)
        fireAlert('NOSHOW_BAS','No-Show Not Checked (Basement) — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. No-show not checked with basement (within 20min).','FIC/Ramp','High');
    }

    // ── No-Show with TRC — 0:10 before STD ──────────────
    if(hasDep&&f.STD){
      const mu=minsUntil(f.STD);
      autoDismiss('NOSHOW_TRC',!!fic.NoShowCheckedWithTRC);
      if(!fic.NoShowCheckedWithTRC&&mu!==null&&mu<=10&&mu>=0)
        fireAlert('NOSHOW_TRC','No-Show Not Checked (TRC) — '+f.FlightNo,f.FlightNo+' STD '+f.STD+'. No-show not checked with TRC (within 10min).','FIC/Ramp','Critical');
    }
  });
}

  } else {

  }
  const errDiv=h('div',{cls:'lerr',style:'display:none'});card.appendChild(errDiv);
  const uRow=h('div',{cls:'fr'});uRow.appendChild(ht('label','fl','Username'));const uInp=h('input',{type:'text',cls:'fc',placeholder:'Enter username',autocomplete:'off'});uRow.appendChild(uInp);card.appendChild(uRow);
  const pRow=h('div',{cls:'fr'});pRow.appendChild(ht('label','fl','Password'));const pInp=h('input',{type:'password',cls:'fc',placeholder:'Enter password'});pRow.appendChild(pInp);card.appendChild(pRow);

    const u=uInp.value.trim().toLowerCase(),p=pInp.value;
    if(!u||!p){errDiv.textContent='Enter username and password.';errDiv.style.display='block';return;}
    errDiv.style.display='none';btn.disabled=true;btn.textContent='Signing in...';

    if(isSupabaseConfigured){
      const {data,error}=await sb.auth.signInWithPassword({email:authEmail(u),password:p});
      if(error){
        // BOOTSTRAP FALLBACK: if this user hasn't been provisioned to
        // Supabase Auth yet, allow a one-time legacy login using the
        // plain-text password stored in DB.users so they can access
        // the Users page and provision accounts. Once AuthProvisioned
        // is true for everyone, this path becomes unreachable (and is
        // fully removed once supabase_auth_rls.sql is run).
        try{
          const checkDB=await loadDB();
          const legacyUser=checkDB.users.find(x=>x.Username===u&&x.Password===p&&x.IsActive&&!x.AuthProvisioned);
          if(legacyUser){
            DB=checkDB;
            S.user=legacyUser;S.userRole=legacyUser.Role;S.userDept=legacyUser.Department;S.userID=legacyUser.ID;S.loggedIn=true;S.nav='users';
            addAudit('Login','','Bootstrap login (account not yet provisioned)');
            showToast('⚠ Account not linked to secure auth yet — go to Users to provision it','ti');
            await saveDB();render();return;
          }
        }catch(e){/* ignore, fall through to error below */}
        btn.disabled=false;btn.textContent='Sign In';
        errDiv.textContent='Invalid username or password.';errDiv.style.display='block';
        return;
      }
      // Load shared DB now that we're authenticated
      DB=await loadDB();
      const found=DB.users.find(x=>x.Username===u&&x.IsActive);
      if(!found){
        errDiv.textContent='Account not set up. Contact your administrator.';errDiv.style.display='block';
        btn.disabled=false;btn.textContent='Sign In';
        await sb.auth.signOut();
        return;
      }
      S.user=found;S.userRole=found.Role;S.userDept=found.Department;S.userID=found.ID;S.loggedIn=true;S.nav='dashboard';
      addAudit('Login','','Successful login');await saveDB();startRealtimeSync();render();
    } else {
      // Local-only fallback: legacy plain-text check
      if(!DB) DB=await loadDB();
      const found=DB.users.find(x=>x.Username===u&&x.Password===p&&x.IsActive);
      if(!found){
        btn.disabled=false;btn.textContent='Sign In';
        addAudit('LoginFailed','','Failed login: '+u);
        errDiv.textContent='Invalid username or password.';errDiv.style.display='block';
      } else {
        S.user=found;S.userRole=found.Role;S.userDept=found.Department;S.userID=found.ID;S.loggedIn=true;S.nav='dashboard';
        addAudit('Login','','Successful login');render();
      }
    }
  }},'Sign In');
  pInp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
  card.appendChild(btn);
  if(!isSupabaseConfigured){
    const hints=h('div',{style:'margin-top:14px;border-top:1px solid #e5e7eb;padding-top:11px'});
    hints.appendChild(ht('div','xs mut mb1','Demo accounts — click to fill:'));
    [['islam','Manager'],['rasheed','Duty Manager'],['khalid','OCC Agent'],['anas','FIC/Ramp Agent'],['feras','Basement Agent']].forEach(([u,r])=>{
      const row=h('div',{style:'display:flex;justify-content:space-between;margin-top:3px'});
      const lnk=ht('span','xs',u+' / 123456');lnk.style.cssText='cursor:pointer;color:#2563eb;text-decoration:underline';
      lnk.onclick=()=>{uInp.value=u;pInp.value='123456';};
      row.appendChild(lnk);row.appendChild(ht('span','xs mut',r));hints.appendChild(row);
    });
    card.appendChild(hints);
  } else {
    const note=h('div',{style:'margin-top:14px;border-top:1px solid #e5e7eb;padding-top:11px'});
    note.appendChild(ht('div','xs mut','First time? Ask your Manager to set up your account in Users.'));
    card.appendChild(note);
  }
  wrap.appendChild(card);
  return wrap;
}

function getServiceType(f){
  if(f.ServiceType) return f.ServiceType;
  if(f.STA&&f.STD) return 'TurnAround';
  if(f.STA) return 'Terminating';
  return 'Originating';
}

function getDashRowColor(f){
  const s=computeAutoStatus(f);
  if(f.Status==='Arrived'||f.Status==='Departed') return '#d4edda'; // green
  if(f.Status==='Cancelled') return '#f5c6cb';                      // pink/red
  if(s==='Arr Delayed'||s==='Dep Delayed') return '#fff3cd';        // yellow
  if(f.ATA||f.ATD) return '#fce8c3';                               // orange/operated
  return '';                                                         // white/scheduled
}

function renderDash(){
  const wrap=h('div',{});

  // Auto-update statuses
  const flights=DB.flights.filter(f=>!f.IsDeleted&&f.FlightDate===S.dashDate);
  flights.forEach(f=>{
    const autoStatus=computeAutoStatus(f);
    if(autoStatus!==f.Status&&(autoStatus==='Dep Delayed'||autoStatus==='Arr Delayed'||autoStatus==='On Time')){
      const fl=DB.flights.find(x=>x.ID===f.ID);
      if(fl&&fl.Status!=='Departed'&&fl.Status!=='Arrived'&&fl.Status!=='Cancelled'){fl.Status=autoStatus;f.Status=autoStatus;saveDB();}
    }
  });

  // ── Top bar ─────────────────────────────────────────────

// ════════════════════════════════════════════════════════════
// FMR XML SYNC ENGINE
// Parses FS-FMR-DATESOPAL XML exports and syncs flight data.
// Sync key = Airline + FlightNo + Date, so repeated syncs of
// the same flight UPDATE it instead of duplicating.
// ════════════════════════════════════════════════════════════

function fmrTimeToHHMM(t){ // "09:05" -> "0905"
  if(!t) return '';
  return t.replace(':','').trim();
}
function fmrDateToISO(d){ // "6/15/2026" -> "2026-06-15"
  if(!d) return '';
  const p=d.trim().split('/');
  if(p.length!==3) return '';
  return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');
}
function fmrOpTypeMap(ot1){
  const v=(ot1||'').trim().toUpperCase();
  if(v==='SKD'||v==='SCHEDULE'||v==='SCHEDULE EXTRA') return 'SKD';
  if(v.includes('HAJ')) return 'HAJ';
  if(v.includes('FREIGHT')) return 'FREIGHTER';
  if(v.includes('CARGO')) return 'CARGO';
  return v?v:'Other';
}
function fmrSyncKey(airline,flightNo,date){
  return (airline||'').trim().toUpperCase()+'-'+(flightNo||'').trim()+'-'+(date||'').trim();
}

// Parse the raw FMR XML text into an array of normalized record objects
function parseFMRXML(xmlText){
  const parser=new DOMParser();
  const doc=parser.parseFromString(xmlText,'text/xml');
  const perr=doc.querySelector('parsererror');
  if(perr) throw new Error('Invalid XML format');
  const details=Array.from(doc.getElementsByTagName('Detail'));
  if(!details.length) throw new Error('No flight records found in this file');
  return details.map(d=>{
    const get=(attr)=>d.getAttribute(attr)||'';
    return {
      airline:get('AirlineCode'),
      arrFlightNo:get('ArrivalFlightNumber'),
      depFlightNo:get('DepartureFlightNumber'),
      reg:get('DAircraftRegistration'),
      acType:get('AircraftType'),
      origin:get('Origin1'),
      dest:get('Destination1'),
      sta:fmrTimeToHHMM(get('STA')),
      std:fmrTimeToHHMM(get('STD')),
      date:fmrDateToISO(get('SDA')),
      parking:get('AircraftParkingColumn').trim(),
      opType:fmrOpTypeMap(get('OperationType1')),
      arrStatus:get('ArrivalStatus'),
      depStatus:get('DepartureStatus'),
    };
  }).filter(r=>r.airline&&(r.arrFlightNo||r.depFlightNo)&&r.date); // skip empty placeholder rows
}

// Decide ServiceType per business rule:
// - XY: always split into separate Terminating (arrival) and Originating (departure) flights
// - All other airlines: if record has BOTH arr+dep -> TurnAround; otherwise single-leg Terminating/Originating
function recordsToFlightDrafts(records){
  const drafts=[];
  records.forEach(r=>{
    if(r.airline.toUpperCase()==='XY'){
      if(r.arrFlightNo){
        drafts.push({...r,flightNo:r.arrFlightNo,serviceType:'Terminating',syncKey:fmrSyncKey(r.airline,r.arrFlightNo,r.date)});
      }
      if(r.depFlightNo){
        drafts.push({...r,flightNo:r.depFlightNo,serviceType:'Originating',syncKey:fmrSyncKey(r.airline,r.depFlightNo,r.date)});
      }
    } else {
      if(r.arrFlightNo&&r.depFlightNo){
        drafts.push({...r,flightNo:r.arrFlightNo,depFlightNoVal:r.depFlightNo,serviceType:'TurnAround',syncKey:fmrSyncKey(r.airline,r.arrFlightNo,r.date)});
      } else if(r.arrFlightNo){
        drafts.push({...r,flightNo:r.arrFlightNo,serviceType:'Terminating',syncKey:fmrSyncKey(r.airline,r.arrFlightNo,r.date)});
      } else if(r.depFlightNo){
        drafts.push({...r,flightNo:r.depFlightNo,serviceType:'Originating',syncKey:fmrSyncKey(r.airline,r.depFlightNo,r.date)});
      }
    }
  });
  return drafts;
}

// Compare drafts against existing DB.flights and build a change plan
function buildFMRSyncPlan(drafts){
  const plan={toCreate:[],toUpdate:[],unchanged:0};
  drafts.forEach(d=>{
    const existing=DB.flights.find(f=>f.FMRSyncKey===d.syncKey&&!f.IsDeleted);
    if(!existing){
      plan.toCreate.push(d);
    } else {
      const changes={};
      if(d.acType&&d.acType!==existing.AircraftType) changes.AircraftType={from:existing.AircraftType,to:d.acType};
      if(d.reg&&d.reg!==existing.AircraftRegistration) changes.AircraftRegistration={from:existing.AircraftRegistration,to:d.reg};
      if(d.parking&&d.parking!=='OPEN'&&d.parking!==existing.ParkingStand) changes.ParkingStand={from:existing.ParkingStand,to:d.parking};
      if(d.opType&&d.opType!==existing.OperationType) changes.OperationType={from:existing.OperationType,to:d.opType};
      if(Object.keys(changes).length){
        plan.toUpdate.push({draft:d,existing,changes});
      } else {
        plan.unchanged++;
      }
    }
  });
  return plan;
}

// Apply a sync plan to DB.flights — call after user confirms preview
async function applyFMRSyncPlan(plan,fileName,progressCb){
  const BATCH=30;
  let done=0;
  const total=plan.toCreate.length;

  // Apply updates first (small, do all at once)
  plan.toUpdate.forEach(({existing,changes})=>{
    const fl=DB.flights.find(f=>f.ID===existing.ID);
    if(!fl) return;
    Object.keys(changes).forEach(k=>{fl[k]=changes[k].to;});
    fl.UpdatedByUser=S.user.Username;fl.UpdatedAt=new Date().toISOString();
  });

  // Apply creates in batches, saving after each batch
  for(let i=0;i<plan.toCreate.length;i+=BATCH){
    const batch=plan.toCreate.slice(i,i+BATCH);
    batch.forEach(d=>{
      const nf={
        ID:DB.nextID.flights++,
        FlightNo:d.flightNo,ServiceType:d.serviceType,FlightDate:d.date,Airline:d.airline,
        ArrFlightNo:d.serviceType==='Originating'?'':d.flightNo,
        DepFlightNo:d.serviceType==='Terminating'?'':(d.depFlightNoVal||(d.serviceType==='Originating'?d.flightNo:'')),
        Origin:d.origin||'—',Destination:d.dest||'—',
        SDA:d.date,SDD:d.date,ADA:'',ADD:'',
        STA:d.serviceType==='Originating'?'':d.sta,
        STD:d.serviceType==='Terminating'?'':d.std,
        ATA:'',ATD:'',
        ParkingStand:(d.parking&&d.parking!=='OPEN')?d.parking:'',
        AircraftType:d.acType,AircraftRegistration:d.reg,
        OperationType:d.opType,
        Status:'Scheduled',IsDeleted:false,
        FMRSyncKey:d.syncKey,
        CreatedByUser:S.user.Username,UpdatedByUser:S.user.Username,DeleteReason:''
      };
      DB.flights.push(nf);
    });
    done+=batch.length;
    if(progressCb) progressCb(done,total);
    await saveDB();
    // Small pause between batches to avoid rate-limiting
    if(i+BATCH<plan.toCreate.length) await new Promise(r=>setTimeout(r,300));
  }

  // If no creates (updates only), still need one save
  if(plan.toCreate.length===0) await saveDB();

  DB.fmrSyncs.push({ID:DB.nextID.fmrSyncs++,FileName:fileName,SyncedBy:S.user.Username,SyncedAt:new Date().toISOString(),Created:plan.toCreate.length,Updated:plan.toUpdate.length,Unchanged:plan.unchanged});
  addAudit('Sync','Flight','FMR sync: '+plan.toCreate.length+' created, '+plan.toUpdate.length+' updated, '+plan.unchanged+' unchanged — '+fileName);
  await saveDB();
}

function triggerFMRUpload(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.xml';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file) return;
    const text=await file.text();
    try{
      const records=parseFMRXML(text);
      const drafts=recordsToFlightDrafts(records);
      const plan=buildFMRSyncPlan(drafts);
      showFMRSyncPreview(plan,file.name);
    }catch(err){
      showToast('FMR import failed: '+err.message,'te');
    }
  };
  inp.click();
}

  const btnRow=h('div',{cls:'flex g2x',style:'margin-top:10px'});

async function parseAndImportCSV(text,fileName){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  if(!lines.length){showToast('Empty CSV file','te');return;}
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,''));
  const rows=lines.slice(1).filter(l=>l.replace(/,/g,'').trim());
  let success=0,failed=0,errors=[];
  rows.forEach((line,idx)=>{
    const cols=line.split(',').map(c=>c.trim());
    const get=(key)=>{const i=headers.indexOf(key);return i>=0?cols[i]||'':''};
    const airlineCode=get('airlinecode');
    const serviceType=get('servicetype').trim();
    const sda=get('sda');const sdd=get('sdd');
    const arrFno=get('arrfno');const depFno=get('depfno');
    const aircraft=get('aircraft');const acReg=get('aircraftreg');
    const origin1=get('origin1');const dest1=get('dest1');
    const sta=get('sta').replace(':','');const std=get('std').replace(':','');
    if(!airlineCode||!serviceType){failed++;errors.push('Row '+(idx+2)+': Missing airline or service type');return;}
    const flightNo=(arrFno||depFno||'').trim();
    if(!flightNo){failed++;errors.push('Row '+(idx+2)+': No flight number');return;}
    const flightDate=sda||sdd||new Date().toISOString().slice(0,10);
    // Normalise date M/D/YYYY → YYYY-MM-DD
    function normDate(d){if(!d) return '';const p=d.split('/');if(p.length===3){return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}return d;}
    const normSDA=normDate(sda);const normSDD=normDate(sdd);
    const normFD=normSDA||normSDD;
    const dup=DB.flights.find(x=>x.FlightNo===flightNo&&x.FlightDate===normFD&&!x.IsDeleted);
    if(dup){failed++;errors.push('Row '+(idx+2)+': Duplicate '+flightNo+' on '+normFD);return;}
    const nf={ID:DB.nextID.flights++,FlightNo:flightNo,ServiceType:serviceType,FlightDate:normFD,Airline:airlineCode,ArrFlightNo:arrFno,DepFlightNo:depFno,Origin:origin1||'—',Destination:dest1||'—',SDA:normSDA,SDD:normSDD,ADA:'',ADD:'',STA:sta,STD:std,ATA:'',ATD:'',ParkingStand:'',AircraftType:aircraft,AircraftRegistration:acReg,Status:'Scheduled',IsDeleted:false,CreatedByUser:S.user.Username,UpdatedByUser:S.user.Username,DeleteReason:''};
    DB.flights.push(nf);success++;
  });
  DB.scheduleImports.push({ID:DB.nextID.scheduleImports++,FileName:fileName,UploadedBy:S.user.Username,UploadedAt:new Date().toISOString(),TotalRows:rows.length,SuccessfulRows:success,FailedRows:failed,ImportStatus:failed===0?'Completed':'Partial',ErrorSummary:errors.join('; ')});
  addAudit('Upload','Schedule','CSV import: '+success+' added, '+failed+' failed — '+fileName);
  await saveDB();
  showToast(`CSV imported: ${success} flights added${failed>0?', '+failed+' failed':''}  ✓`,'ts');
  if(errors.length) setTimeout(()=>alert('Import warnings:\n'+errors.join('\n')),300);
  render();
}

// Auto-compute status based on actual vs scheduled times
function computeAutoStatus(f){
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  if(f.ATD&&f.STD&&f.ATD>f.STD) return 'Dep Delayed';
  if(f.ATA&&f.STA&&f.ATA>f.STA) return 'Arr Delayed';
  if(f.ATD&&f.STD&&f.ATD<=f.STD) return 'On Time';
  if(f.ATA&&f.STA&&f.ATA<=f.STA) return 'On Time';
  return f.Status;
}

// Get flight card color class based on urgency/status
function getFlightCardColor(f){
  const bl=getBL(f.ID);
  const autoStatus=computeAutoStatus(f);
  if(autoStatus==='Dep Delayed'||autoStatus==='Arr Delayed') return 'flight-card-red';
  if(f.Status==='Cancelled') return 'flight-card-grey';
  if(f.Status==='Departed'||f.Status==='Arrived') return 'flight-card-green';
  // Check if STD < 4 hours away and no pre-flight check
  if(f.STD&&f.FlightDate){
    const now=new Date();
    const stdFull=new Date(f.FlightDate+'T'+f.STD+':00');
    const diffHrs=(stdFull-now)/3600000;
    const preFlightDone=bl&&bl.PreFlightBriefingCheck;
    if(diffHrs>=0&&diffHrs<4&&!preFlightDone) return 'flight-card-orange';
    if(diffHrs>=0&&diffHrs<4) return 'flight-card-yellow';
  }
  return 'flight-card-default';
}

function downloadReport(){
  const rDate=S.reportDate||S.dashDate;
  let rFlights=DB.flights.filter(f=>!f.IsDeleted&&f.FlightDate===rDate);
  if(S.reportFlight&&S.reportFlight.trim()) rFlights=rFlights.filter(f=>f.FlightNo.toLowerCase().includes(S.reportFlight.trim().toLowerCase()));
  rFlights.sort((a,b)=>(a.STA||'').localeCompare(b.STA||''));
  const rows=[['Flight No','Date','Origin','Destination','STA','ATA','STD','ATD','Stand','Status','Basement Status','FIC Status','Pre-flight Check','Pre-flight Time','EZFW Sent','LIR Release','LIR Release Time','All Baggage Ready','Baggage Ready Time','Dep MVT Sent','Dep MVT Time','Arr MVT Sent','Arr MVT Time','CPM Checked','CPM Time']];
  rFlights.forEach(f=>{
    const bl=getBL(f.ID)||{};const fi2=getFIC(f.ID)||{};
    rows.push([f.FlightNo,f.FlightDate,f.Origin,f.Destination,f.STA||'',f.ATA||'',f.STD||'',f.ATD||'',f.ParkingStand||'',computeAutoStatus(f),bl.CompletionStatus||'Not Started',fi2.CompletionStatus||'Not Started',bl.PreFlightBriefingCheck?'Yes':'No',bl.PreFlightBriefingCheckAt||'',bl.EZFWSent?'Yes':'No',bl.LIRReleaseCheck?'Yes':'No',bl.LIRReleaseTime||'',bl.AllBaggageReadyInBasement?'Yes':'No',bl.AllBaggageReadyInBasementAt||'',bl.DepMVTSent?'Yes':'No',bl.DepMVTSentAt||'',bl.ArrMVTSent?'Yes':'No',bl.ArrMVTSentAt||'',bl.CPMChecked?'Yes':'No',bl.CPMCheckedAt||'']);
  });

function mkChk(lbl,val,ro,existingTs){
  const row=h('div',{cls:'fck'});
  const uid='c'+Math.random().toString(36).slice(2);
  const inp=h('input',{type:'checkbox',id:uid});
  if(val) inp.checked=true;if(ro) inp.disabled=true;
  const lb=ht('label','',lbl);lb.setAttribute('for',uid);
  const tsSpan=ht('span','xs mut','');tsSpan.style.cssText='margin-left:8px;font-size:10px;color:#5a6a8a';
  // Show existing timestamp if already checked
  if(val&&existingTs) tsSpan.textContent='✓ '+existingTs;
  if(!ro){
    inp.addEventListener('change',()=>{
      // First-update only: once checked and timestamped, don't overwrite
      if(inp.checked&&!inp._checkedAt&&!existingTs){
        const now=new Date();
        const ts=now.getHours().toString().padStart(2,'0')+now.getMinutes().toString().padStart(2,'0');
        tsSpan.textContent='✓ '+ts;
        inp._checkedAt=ts;
      } else if(!inp.checked){
        tsSpan.textContent='';inp._checkedAt='';
      }
    });
  }
  row.appendChild(inp);row.appendChild(lb);row.appendChild(tsSpan);return{el:row,inp};
}
function mkField(lbl,val,ro){

  const inp=h('input',{type:'text',cls:'fc',value:val||''});if(ro) inp.disabled=true;
  row.appendChild(inp);return{el:row,inp};
}

function mkTime(lbl,val,ro){
  const row=h('div',{cls:'fr'});row.appendChild(ht('label','fl',lbl));
  const inp=h('input',{type:'text',cls:'fc',value:val||'',placeholder:'hhmm',maxlength:'4'});
  if(ro) inp.disabled=true;
  inp.addEventListener('input',()=>{inp.value=inp.value.replace(/\D/g,'').slice(0,4);});
  inp.addEventListener('blur',()=>{
    const v=inp.value.replace(/\D/g,'');
    if(v.length>=3){const hh=v.slice(0,2);const mm=v.slice(2,4).padEnd(2,'0');inp.value=hh+mm;}
  });
  row.appendChild(inp);return{el:row,inp};
}
function mkTA(lbl,val,ro){
  const row=h('div',{cls:'fr'});row.appendChild(ht('label','fl',lbl));
  const inp=h('textarea',{cls:'fc'},val||'');if(ro) inp.disabled=true;
  row.appendChild(inp);return{el:row,inp};
}
function mkSel(lbl,val,opts,ro){
  const row=h('div',{cls:'fr'});row.appendChild(ht('label','fl',lbl));
  const sel=h('select',{cls:'fc'});opts.forEach(o=>{const op=h('option',{value:o},o);if(o===val)op.selected=true;sel.appendChild(op);});
  if(ro) sel.disabled=true;row.appendChild(sel);return{el:row,sel};
}
function mkPRN(wrap,refs,nameKey,prnKey,nameLbl,prnLbl,existing,ro){
  const g=h('div',{cls:'g2'});
  const nf=mkField(nameLbl,existing[nameKey]||'',ro);refs[nameKey]=nf.inp;
  const pf=mkField(prnLbl,existing[prnKey]||'',ro);refs[prnKey]=pf.inp;
  g.appendChild(nf.el);g.appendChild(pf.el);wrap.appendChild(g);
}

    const g2b=h('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px'});
    const stdF=mkTime('STD (hhmm)',f.STD||'',true);g2b.appendChild(stdF.el);
    const atdF=mkTime('ATD (hhmm) ⚠',f.ATD||'',ro);refs.ATD=atdF.inp;g2b.appendChild(atdF.el);
    wrap.appendChild(g2b);

    // Station Delay
    wrap.appendChild(ht('div','sec-t','⏱ Station Delay'));
    // toggle
    const delayChk=mkChk('Station Delay Occurred',f.StationDelay||false,ro,'');refs.StationDelay=delayChk.inp;
    wrap.appendChild(delayChk.el);
    const delayBlock=h('div',{style:'margin-top:8px'});
    delayBlock.style.display=(f.StationDelay?'block':'none');
    delayChk.inp.addEventListener('change',()=>{delayBlock.style.display=delayChk.inp.checked?'block':'none';});
    // 3 rows of delay
    const delayRefs=[];
    for(let i=1;i<=3;i++){
      const drow=h('div',{style:'display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px;margin-bottom:6px;align-items:end'});
      const dc=mkField(`${i}${i===1?'st':i===2?'nd':'rd'} Delay Code`,(f['DelayCode'+i]||''),ro);
      const dt=mkTime(`Delay Time`,(f['DelayTime'+i]||''),ro);
      const dr=mkField(`Delay Reason`,(f['DelayReason'+i]||''),ro);
      drow.appendChild(dc.el);drow.appendChild(dt.el);drow.appendChild(dr.el);
      delayBlock.appendChild(drow);
      delayRefs.push({code:dc.inp,time:dt.inp,reason:dr.inp});
    }
    wrap.appendChild(delayBlock);
    refs._delayRefs=delayRefs;
  }

  // ══ PARKING STAND ═══════════════════════════════════════
  wrap.appendChild(ht('div','sec-t','🅿 Parking Stand ⚠ (3hrs before STD)'));
  const psrow=h('div',{cls:'g2'});
  const psf=mkField('Stand No.',f.ParkingStand||'',ro);refs.ParkingStand=psf.inp;
  const pstime=mkTime('Allocation Time (hhmm)',f.StandAllocatedAt||'',ro);refs.StandAllocatedAt=pstime.inp;
  [psf,pstime].forEach(x=>psrow.appendChild(x.el));wrap.appendChild(psrow);
  const hist=f.StandHistory||[];
  if(hist.length){
    const htbl=h('div',{style:'background:#f8faff;border-radius:6px;padding:8px;margin-top:6px'});
    htbl.appendChild(ht('div','xs mut mb1','Stand Change History'));
    hist.forEach(sh=>htbl.appendChild(ht('div','xs','🅿 '+sh.stand+' — '+sh.time+(sh.by?' by '+sh.by:''))));
    wrap.appendChild(htbl);
  }

  // ══ AIRCRAFT ════════════════════════════════════════════
  wrap.appendChild(ht('div','sec-t','✈ Aircraft'));
  const acg=h('div',{cls:'g2'});
  const acTypes=['B737','B737 MAX','B777','B787','A320','A321','A321 NEO','A330','A350','Other'];
  const actSel=mkSel('A/C Type',f.AircraftType||'A320',acTypes,ro);refs.AircraftType=actSel.sel;
  const acrF=mkField('A/C Registration',f.AircraftRegistration||'',ro);refs.AircraftRegistration=acrF.inp;
  [actSel,acrF].forEach(x=>acg.appendChild(x.el));wrap.appendChild(acg);

  wrap.appendChild(h('div',{cls:'notebox',style:'margin-top:8px'},'⚠ Fields marked ⚠ are notifiable — missing values will appear in Alerts.'));

  if(!ro){
    const sb=h('button',{cls:'btn bp',style:'margin-top:12px',onClick:async()=>{
      const fl=DB.flights.find(x=>x.ID===f.ID);
      if(fl){
        const newATA=refs.ATA?refs.ATA.value:'';
        const newATD=refs.ATD?refs.ATD.value:'';
        const newStand=refs.ParkingStand.value;
        if(newStand&&newStand!==fl.ParkingStand){
          const history=fl.StandHistory||[];
          const now=new Date();const ts=now.getHours().toString().padStart(2,'0')+now.getMinutes().toString().padStart(2,'0');
          history.push({stand:newStand,time:ts,by:S.user.Username});fl.StandHistory=history;
        }
        let autoStatus=fl.Status;
        if(newATA&&fl.STA&&newATA>fl.STA) autoStatus='Arr Delayed';
        else if(newATD&&fl.STD&&newATD>fl.STD) autoStatus='Dep Delayed';
        else if(newATD&&fl.STD&&newATD<=fl.STD) autoStatus='On Time';
        else if(newATA&&fl.STA&&newATA<=fl.STA) autoStatus='On Time';
        const delayData={StationDelay:refs.StationDelay?refs.StationDelay.checked:false};
        if(refs._delayRefs) refs._delayRefs.forEach((d,i)=>{delayData['DelayCode'+(i+1)]=d.code.value;delayData['DelayTime'+(i+1)]=d.time.value;delayData['DelayReason'+(i+1)]=d.reason.value;});
        Object.assign(fl,{ATA:newATA,ATD:newATD,
          ActualDateArr:refs.ActualDateArr?refs.ActualDateArr.value:fl.ActualDateArr,
          ActualDateDep:refs.ActualDateDep?refs.ActualDateDep.value:fl.ActualDateDep,
          ParkingStand:newStand,StandAllocatedAt:refs.StandAllocatedAt.value,
          AircraftType:refs.AircraftType.value,AircraftRegistration:refs.AircraftRegistration.value,
          Status:autoStatus,...delayData,UpdatedByUser:S.user.Username,UpdatedAt:new Date().toISOString()});
        S.selFlight=fl;
      }
      addAudit('Update','Flight','Flight times updated: '+f.FlightNo,f.ID);
      await saveDB();showToast('Flight times updated ✓','ts');S.modal=null;render();
    }},ic('device-floppy',13),' Save Flight Times');
    wrap.appendChild(sb);
  }
  return wrap;
}

function buildAddFlightModal(){
  const isEdit=!!S.editFlight;
  const f=S.editFlight||{};
  const modal=h('div',{cls:'modal modal-lg'});
  const mh=h('div',{cls:'mh'});
  mh.appendChild(ht('div','mt',isEdit?'Edit Flight':'Generate Flight Schedule — Entry Screen'));
  const cl=h('button',{cls:'mc',onClick:()=>{S.modal=null;S.editFlight=null;render();}},'×');mh.appendChild(cl);modal.appendChild(mh);

  // ── STEP 1: Operation / Airline / Date ───────────────────
  if(!isEdit&&S.scheduleStep===1){
    modal.appendChild(ht('div','sec-t','Select Operation & Date'));
    const g=h('div',{cls:'g3'});
    const ops=mkSel('Operation',S.scheduleOp||'SCHEDULE',['SCHEDULE','CHARTER','SPECIAL'],false);ops.sel.onchange=e=>{S.scheduleOp=e.target.value;};
    const al=mkField('Airline Code',S.scheduleAirline||'SV',false);al.inp.oninput=e=>{S.scheduleAirline=e.target.value.toUpperCase();};
    const dt=mkField('Date',S.scheduleDate||new Date().toISOString().slice(0,10),false);dt.inp.type='date';dt.inp.oninput=e=>{S.scheduleDate=e.target.value;};
    [ops,al,dt].forEach(x=>g.appendChild(x.el));modal.appendChild(g);
    const sb=h('button',{cls:'btn bp',style:'margin-top:14px',onClick:()=>{
      if(!S.scheduleAirline.trim()){showToast('Airline code required','te');return;}
      if(!S.scheduleDate){showToast('Date required','te');return;}
      S.scheduleStep=2;render();
    }},ic('arrow-right',13),' Start Entry');
    modal.appendChild(sb);
    return modal;
  }

  // ── STEP 2: Flight Details ───────────────────────────────
  const refs={};
  // Service type selector (drives which fields show)
  const stVal=isEdit?(f.ServiceType||'TurnAround'):(S._newServiceType||'TurnAround');
  modal.appendChild(ht('div','sec-t','Flight Details'));
  const topRow=h('div',{cls:'g3'});
  const stSel=mkSel('Service Type',stVal,['Originating','Terminating','TurnAround'],false);
  refs.ServiceType=stSel.sel;
  stSel.sel.onchange=e=>{S._newServiceType=e.target.value;render();};
  const acTypeSel=mkSel('A/C Type',f.AircraftType||'A320',['B737','B737 MAX','B777','B787','A320','A321','A321 NEO','A330','A350','Other'],false);refs.AircraftType=acTypeSel.sel;
  const acReg=mkField('A/C Registration',f.AircraftRegistration||'',false);refs.AircraftRegistration=acReg.inp;
  [stSel,acTypeSel,acReg].forEach(x=>topRow.appendChild(x.el));modal.appendChild(topRow);

  const isTurn=stVal==='TurnAround';
  const isOri=stVal==='Originating';
  const isTerm=stVal==='Terminating';

  // Daily flights + Departure day (for TurnAround)
  if(isTurn){
    const drow=h('div',{cls:'g2'});
    const dfChk=mkChk('Daily Flights',f.DailyFlights||false,false,'');refs.DailyFlights=dfChk.inp;
    const ddSel=mkSel('Departure Day',f.DepartureDay||'0-Same day',['0-Same day','+1-Next day'],false);refs.DepartureDay=ddSel.sel;
    drow.appendChild(dfChk.el);drow.appendChild(ddSel.el);modal.appendChild(drow);
  }

  // Flight numbers
  const fnRow=h('div',{cls:'g2'});
  if(!isOri){const af=mkField('Arrival Flight Number',f.ArrFlightNo||'',false);refs.ArrFlightNo=af.inp;fnRow.appendChild(af.el);}
  if(!isTerm){const df=mkField('Departure Flight Number',f.DepFlightNo||'',false);refs.DepFlightNo=df.inp;fnRow.appendChild(df.el);}
  modal.appendChild(fnRow);

  // STA / STD
  const timeRow=h('div',{cls:'g2'});
  if(!isOri){const sta=mkTime('STA (hhmm)',f.STA||'',false);refs.STA=sta.inp;timeRow.appendChild(sta.el);}
  if(!isTerm){
    const std=mkTime('STD (hhmm)',f.STD||'',false);refs.STD=std.inp;timeRow.appendChild(std.el);
    // For turnaround: show departure date info
    if(isTurn){
      const depDate=isEdit?f.SDD:(S.scheduleDate||new Date().toISOString().slice(0,10));
      const ddLabel=ht('div','xs mut mt2','Dep Date: '+depDate+(refs.DepartureDay&&refs.DepartureDay.value==='+1-Next day'?' (+1 next day)':' (same day)'));
      timeRow.appendChild(ddLabel);
    }
  }
  modal.appendChild(timeRow);

  // Origins / Destinations
  const routeRow=h('div',{cls:'g2'});
  if(!isOri){const o1=mkField('Origin 1 (IATA)',f.Origin||'',false);refs.Origin=o1.inp;routeRow.appendChild(o1.el);}
  if(!isTerm){const d1=mkField('Destination 1 (IATA)',f.Destination||'',false);refs.Destination=d1.inp;routeRow.appendChild(d1.el);}
  modal.appendChild(routeRow);
  const route2Row=h('div',{cls:'g2'});
  const o2=mkField('Origin 2 (optional)',f.Origin2||'',false);refs.Origin2=o2.inp;
  const d2=mkField('Destination 2 (optional)',f.Destination2||'',false);refs.Destination2=d2.inp;
  route2Row.appendChild(o2.el);route2Row.appendChild(d2.el);modal.appendChild(route2Row);

  // Remarks
  const remRow=h('div',{cls:'g2'});
  const ar=mkField('Arrival Remarks',f.ArrivalRemarks||'',false);refs.ArrivalRemarks=ar.inp;
  const dr=mkField('Departure Remarks',f.DepartureRemarks||'',false);refs.DepartureRemarks=dr.inp;
  remRow.appendChild(ar.el);remRow.appendChild(dr.el);modal.appendChild(remRow);

  // Action buttons
  const brow=h('div',{cls:'flex g2x',style:'margin-top:14px'});
  if(!isEdit){
    const backB=h('button',{cls:'btn',onClick:()=>{S.scheduleStep=1;render();}},ic('arrow-left',13),' Back');brow.appendChild(backB);
  }
  const saveB=h('button',{cls:'btn bp',onClick:async()=>{
    const st=refs.ServiceType.value;
    const arrFno=refs.ArrFlightNo?refs.ArrFlightNo.value.trim():'';
    const depFno=refs.DepFlightNo?refs.DepFlightNo.value.trim():'';
    const flightNo=arrFno||depFno;
    if(!flightNo){showToast('At least one flight number required','te');return;}
    const flightDate=isEdit?f.FlightDate:(S.scheduleDate||new Date().toISOString().slice(0,10));
    const airline=isEdit?f.Airline:(S.scheduleAirline||'SV');
    const depDay=refs.DepartureDay?refs.DepartureDay.value:'0-Same day';
    let sdd=flightDate;
    if(depDay==='+1-Next day'){
      const nd=new Date(flightDate);nd.setDate(nd.getDate()+1);sdd=nd.toISOString().slice(0,10);
    }
    if(isEdit){
      const fl=DB.flights.find(x=>x.ID===f.ID);
      if(fl) Object.assign(fl,{ServiceType:st,ArrFlightNo:arrFno,DepFlightNo:depFno,FlightNo:flightNo,Origin:refs.Origin?refs.Origin.value:fl.Origin,Destination:refs.Destination?refs.Destination.value:fl.Destination,Origin2:refs.Origin2.value,Destination2:refs.Destination2.value,STA:refs.STA?refs.STA.value:fl.STA,STD:refs.STD?refs.STD.value:fl.STD,SDD:sdd,AircraftType:refs.AircraftType.value,AircraftRegistration:refs.AircraftRegistration.value,ArrivalRemarks:refs.ArrivalRemarks.value,DepartureRemarks:refs.DepartureRemarks.value,DailyFlights:refs.DailyFlights?refs.DailyFlights.checked:fl.DailyFlights,DepartureDay:depDay,UpdatedByUser:S.user.Username});
      addAudit('Update','Flight','Flight updated: '+flightNo,f.ID);
    } else {
      const nf={ID:DB.nextID.flights++,FlightNo:flightNo,ServiceType:st,FlightDate:flightDate,Airline:airline,ArrFlightNo:arrFno,DepFlightNo:depFno,Origin:refs.Origin?refs.Origin.value:'',Destination:refs.Destination?refs.Destination.value:'',Origin2:refs.Origin2.value,Destination2:refs.Destination2.value,SDA:st!=='Originating'?flightDate:'',SDD:st!=='Terminating'?sdd:'',ADA:'',ADD:'',STA:refs.STA?refs.STA.value:'',STD:refs.STD?refs.STD.value:'',ATA:'',ATD:'',ParkingStand:'',AircraftType:refs.AircraftType.value,AircraftRegistration:refs.AircraftRegistration.value,DailyFlights:refs.DailyFlights?refs.DailyFlights.checked:false,DepartureDay:depDay,ArrivalRemarks:refs.ArrivalRemarks.value,DepartureRemarks:refs.DepartureRemarks.value,Status:'Scheduled',IsDeleted:false,DeleteReason:'',CreatedByUser:S.user.Username,UpdatedByUser:S.user.Username};
      DB.flights.push(nf);addAudit('Create','Flight','Flight added: '+flightNo,nf.ID);
    }
    S._newServiceType=null;S.scheduleStep=1;
    await saveDB();showToast('Flight saved ✓','ts');S.modal=null;S.editFlight=null;render();
  }},ic('device-floppy',13),' Save Flight');
  brow.appendChild(saveB);modal.appendChild(brow);

  // Step indicator at top if step 2
  if(!isEdit){
    const stepInfo=ht('div','xs mut mb3','Operation: '+S.scheduleOp+' · Airline: '+S.scheduleAirline+' · Date: '+S.scheduleDate);
    modal.insertBefore(stepInfo,modal.children[1]);
  }
  return modal;
}

function buildAddUserModal(){
  const isEdit=!!S.editUser;const u=S.editUser||{};
  const modal=h('div',{cls:'modal'});
  const mh=h('div',{cls:'mh'});mh.appendChild(ht('div','mt',isEdit?'Edit User':'Add User'));
  const cl=h('button',{cls:'mc',onClick:()=>{S.modal=null;S.editUser=null;render();}},'×');mh.appendChild(cl);modal.appendChild(mh);
  const refs={};const g=h('div',{cls:'g2'});
  const nf=mkField('Display Name',u.DisplayName,false);refs.DisplayName=nf.inp;
  const uf=mkField('Username / PRN (lowercase)',u.Username,false);refs.Username=uf.inp;
  g.appendChild(nf.el);g.appendChild(uf.el);modal.appendChild(g);

  if(!isEdit){
    const pf=mkField('Initial Password',u.Password||'',false);refs.Password=pf.inp;pf.inp.type='text';modal.appendChild(pf.el);
    modal.appendChild(ht('div','xs mut mb2','Min 6 characters. The user can change this later from their account.'));
  } else {
    // New password field — only required if username/PRN is changed
    const npf=mkField('New Password (only if changing Username/PRN)','',false);refs.NewPassword=npf.inp;npf.inp.type='text';npf.inp.placeholder='Min 6 characters';
    modal.appendChild(npf.el);
    modal.appendChild(ht('div','xs mut mb2','⚠ Changing Username/PRN creates a new login. The old login becomes unused — set a new initial password above.'));
  }

  const g2=h('div',{cls:'g2'});
  const roleChangeAllowed=!isEdit||canChangeRoleFor(u);
  const roleOpts=Array.from(new Set([...manageableRoles(),...(isEdit&&u.Role?[u.Role]:[])]));
  const rs=mkSel('Role',u.Role||'Agent',roleOpts.length?roleOpts:['Agent'],!roleChangeAllowed);refs.Role=rs.sel;
  const ds=mkSel('Department',u.Department||'FIC/Ramp',['All','FIC/Ramp','Basement/LC'],false);refs.Department=ds.sel;
  g2.appendChild(rs.el);g2.appendChild(ds.el);modal.appendChild(g2);
  if(!roleChangeAllowed&&isEdit){
    modal.appendChild(h('div',{cls:'notebox'},'You do not have permission to change this user\'s role.'));
  }
  modal.appendChild(h('div',{cls:'notebox'},'Manager, Duty Manager, and OCC Agent must have Department = All. Agents must have FIC/Ramp or Basement/LC.'));

  const sb2=h('button',{cls:'btn bp',style:'margin-top:6px',onClick:async()=>{
    const uname=refs.Username.value.trim().toLowerCase();
    if(!refs.DisplayName.value.trim()||!uname){showToast('All fields required','te');return;}
    if(!isEdit&&(!refs.Password.value||refs.Password.value.length<6)){showToast('Password must be at least 6 characters','te');return;}
    if(!/^[a-z0-9._-]+$/.test(uname)){showToast('Username/PRN: lowercase, numbers, . _ - only','te');return;}
    const dup=DB.users.find(x=>x.Username===uname&&x.ID!==u.ID);
    if(dup){showToast('Username/PRN already exists','te');return;}
    const role=roleChangeAllowed?refs.Role.value:u.Role;
    const dept=refs.Department.value;
    if((role==='Manager'||role==='Duty Manager'||role==='OCC Agent')&&dept!=='All'){showToast('Manager/Duty Manager/OCC Agent must have Department = All','te');return;}
    if(role==='Agent'&&!['FIC/Ramp','Basement/LC'].includes(dept)){showToast('Agents must have FIC/Ramp or Basement/LC','te');return;}
    // Role-change permission re-check (defense in depth)
    if(isEdit&&role!==u.Role&&!canChangeRoleFor(u)){showToast('You cannot change this user\'s role','te');return;}
    if(!isEdit&&!manageableRoles().includes(role)){showToast('You cannot create users with this role','te');return;}

    if(isEdit){
      const usernameChanged=uname!==u.Username;
      if(usernameChanged){
        if(!refs.NewPassword.value||refs.NewPassword.value.length<6){showToast('New Password (min 6 chars) required when changing Username/PRN','te');return;}
        sb2.disabled=true;sb2.textContent='Creating new login...';
        if(isSupabaseConfigured){
          const {error}=await sbAdmin.auth.signUp({email:authEmail(uname),password:refs.NewPassword.value});
          if(error){sb2.disabled=false;sb2.textContent='Save User';showToast('Account creation failed: '+error.message,'te');return;}
        }
      }
      const usr=DB.users.find(x=>x.ID===u.ID);
      if(usr) Object.assign(usr,{DisplayName:refs.DisplayName.value,Username:uname,Role:role,Department:dept,AuthProvisioned:usernameChanged?true:usr.AuthProvisioned,UpdatedBy:S.user.Username,UpdatedAt:new Date().toISOString()});
      addAudit('Update','User','User updated: '+uname+(usernameChanged?' (login changed from '+u.Username+')':''));
      await saveDB();showToast('User saved ✓','ts');S.modal=null;S.editUser=null;render();
    } else {
      sb2.disabled=true;sb2.textContent='Creating account...';
      if(isSupabaseConfigured){
        const {data,error}=await sbAdmin.auth.signUp({email:authEmail(uname),password:refs.Password.value});
        if(error){
          sb2.disabled=false;sb2.textContent='Save User';
          showToast('Account creation failed: '+error.message,'te');return;
        }
      }
      DB.users.push({ID:DB.nextID.users++,DisplayName:refs.DisplayName.value,Username:uname,Role:role,Department:dept,IsActive:true,AuthProvisioned:true,CreatedAt:new Date().toISOString(),CreatedBy:S.user.Username});
      addAudit('Create','User','User created: '+uname+' ('+role+')');
      await saveDB();showToast('User created ✓','ts');S.modal=null;S.editUser=null;render();
    }
  }},ic('device-floppy',13),' Save User');modal.appendChild(sb2);
  return modal;
}

function renderModal(){
  const bd=h('div',{cls:'mbd'});
  let content;
  if(S.modal==='fd') content=buildFDModal();
  else if(S.modal==='addFlight') content=buildAddFlightModal();
  else if(S.modal==='addUser') content=buildAddUserModal();
  else if(S.modal==='fmrPreview') content=buildFMRPreviewModal();
  else return null;
  bd.appendChild(content);
  bd.onclick=e=>{if(e.target===bd){S.modal=null;S.editFlight=null;S.editUser=null;S.fmrPreview=null;render();}};
  return bd;
}

(async()=>{
  if(isSupabaseConfigured){
    // Check for an existing logged-in session (page reload)
    const {data:{session}}=await sb.auth.getSession();
    if(session&&session.user&&session.user.email){
      DB=await loadDB();
      const uname=session.user.email.replace('@fiars.local','');
      const found=DB.users.find(x=>x.Username===uname&&x.IsActive);
      if(found){
        S.user=found;S.userRole=found.Role;S.userDept=found.Department;S.userID=found.ID;S.loggedIn=true;S.nav='dashboard';
        startRealtimeSync();
      }
    }
  } else {
    DB=await loadDB();
  }
  render();
})();
</script>
